{% extends "base.html" %}

{% block extra_head %}
        <style>
            /* Login page: center the card vertically within the viewport */
            .container {
                min-height: calc(100vh - 200px);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .login-card {
                background: var(--surface);
                border-radius: 10px;
                padding: 36px 32px;
                box-shadow: var(--shadow);
                width: 100%;
                max-width: 380px;
                margin: 20px;
            }
            .login-card h1 {
                color: var(--primary);
                font-size: 1.6em;
                margin-bottom: 4px;
                text-align: center;
            }
            .login-card .subtitle {
                color: var(--text-muted);
                font-size: 0.9em;
                text-align: center;
                margin-bottom: 24px;
            }
            .login-field { margin: 16px 0; }
            .login-field label {
                display: block;
                margin-bottom: 6px;
                font-weight: 600;
                color: var(--text-muted);
            }
            .login-field input[type="password"] {
                width: 100%;
                padding: 10px 14px;
                border: 2px solid var(--input-border);
                border-radius: 6px;
                font-size: 1em;
                background: var(--surface);
                color: var(--text);
            }
            .login-field input[type="password"]:focus {
                outline: none;
                border-color: var(--nav-link);
            }
            .login-actions { margin-top: 24px; }
            .btn-login {
                width: 100%;
                padding: 12px;
                background: var(--primary);
                color: var(--header-text);
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1em;
                font-weight: 600;
            }
            .btn-login:hover { background: var(--primary-hover); }
            .error-msg {
                background: var(--error-bg);
                color: var(--error-text);
                padding: 10px 14px;
                border-radius: 6px;
                margin: 12px 0;
                font-size: 0.9em;
                text-align: center;
            }
        </style>
{% endblock %}

{% block content %}
    <div class="login-card">
        <h1>📚 DocMind</h1>
        <p class="subtitle">Authentication required — please sign in.</p>
        {% if error %}
        <div class="error-msg">❌ {{ error }}</div>
        {% endif %}
        <form action="/login" method="post" autocomplete="off">
            <div class="login-field">
                <label for="password">Password / API Key</label>
                <input type="password" name="password" id="password"
                       autofocus required
                       placeholder="Enter your API key">
            </div>
            <div class="login-actions">
                <button type="submit" class="btn-login">🔐 Sign In</button>
            </div>
        </form>
    </div>
{% endblock %}
