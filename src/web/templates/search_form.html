{% extends "base.html" %}

{% block content %}
    <div class="card">
        <h2>Search Documents</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form action="/search" method="get" class="search-box"
              hx-get="/search"
              hx-target="#search-live-region"
              hx-swap="innerHTML"
              hx-trigger="submit, keyup from:find([name='q']) changed delay:250ms, change"
              hx-include="this"
              hx-indicator="#search-loading">
            <input type="text" name="q" class="input" placeholder="Search by keyword or natural language…" required autofocus
                   autocomplete="off">
            <button type="submit" class="btn btn-primary">Search</button>
            <div class="vector-weight-control">
                <label for="vw-slider">
                    Vector Weight: <span class="vw-value" data-default="0.6">0.60</span>
                    <span class="vw-hint">(0 = keyword only, 1 = semantic only)</span>
                </label>
                <input type="range" id="vw-slider" name="vector_weight"
                       min="0" max="1" step="0.05" value="0.6"
                       role="slider"
                       aria-valuemin="0" aria-valuemax="1"
                       aria-valuenow="0.60" aria-valuetext="0.60"
                       class="vw-slider">
            </div>
        </form>
    </div>

    <div id="search-loading" class="htmx-indicator search-live-loading" aria-live="polite" role="status">
        <span class="spinner"></span> Searching…
    </div>
    <div id="search-live-region" aria-live="polite" aria-busy="false"></div>
{% endblock %}
