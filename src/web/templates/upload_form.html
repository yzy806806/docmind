{% extends "base.html" %}

{% block content %}
    <div class="upload-form">
        <h2>Upload Documents</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}

        <!-- Drag-and-drop zone -->
        <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-inner">
                <svg class="drop-icon" width="48" height="48" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p><strong>Drop files here</strong> or click to browse</p>
                <p class="drop-hint">Multiple files supported · PDF, DOCX, HTML, MD, TXT, CSV, JSON, XML</p>
            </div>
            <input id="file-input" type="file" name="files" multiple
                   accept=".txt,.md,.pdf,.docx,.html,.htm,.csv,.json,.xml"
                   style="display:none;">
        </div>

        <!-- File list with per-file progress -->
        <div id="file-list" class="file-list"></div>

        <!-- Fallback: plain form POST (works without JS) -->
        <form id="fallback-form" action="/upload" method="post" enctype="multipart/form-data" style="display:none;">
            <input type="file" name="files" multiple>
            <button type="submit">Upload &amp; Index</button>
        </form>

        <div id="upload-actions" class="upload-actions" style="display:none;">
            <button type="button" id="upload-btn" class="btn-primary">Upload {{ '{{'}}count{{'}}'}} file(s)</button>
            <button type="button" id="clear-btn" class="btn-secondary">Clear</button>
        </div>

        <div id="no-js-note" class="drop-hint" style="margin-top:12px;">
            JavaScript is disabled — <a href="#" onclick="document.getElementById('fallback-form').style.display='block';document.getElementById('drop-zone').style.display='none';this.style.display='none';return false;">use the basic uploader</a>.
        </div>
    </div>

    <script>
    (function() {
        "use strict";

        var dropZone   = document.getElementById('drop-zone');
        var fileInput  = document.getElementById('file-input');
        var fileListEl = document.getElementById('file-list');
        var actionsEl  = document.getElementById('upload-actions');
        var uploadBtn  = document.getElementById('upload-btn');
        var clearBtn   = document.getElementById('clear-btn');
        var noJsNote   = document.getElementById('no-js-note');

        // Hide the no-JS notice once JS runs.
        noJsNote.style.display = 'none';

        var selectedFiles = [];

        // ── Drag events ──────────────────────────────────────
        var dragCounter = 0;

        dropZone.addEventListener('dragenter', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dragCounter++;
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.stopPropagation();
        });

        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.remove('drag-over');
            }
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dragCounter = 0;
            dropZone.classList.remove('drag-over');
            var dt = e.dataTransfer;
            if (dt && dt.files) {
                addFiles(dt.files);
            }
        });

        // ── Click to browse ──────────────────────────────────
        dropZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            if (fileInput.files) {
                addFiles(fileInput.files);
                fileInput.value = '';  // allow re-selecting the same file
            }
        });

        // ── Add files to the list ────────────────────────────
        function addFiles(fileObjs) {
            for (var i = 0; i < fileObjs.length; i++) {
                var f = fileObjs[i];
                // Avoid duplicates by name+size
                var dup = false;
                for (var j = 0; j < selectedFiles.length; j++) {
                    if (selectedFiles[j].name === f.name && selectedFiles[j].size === f.size) {
                        dup = true; break;
                    }
                }
                if (!dup) {
                    selectedFiles.push(f);
                    renderFileItem(f, selectedFiles.length - 1);
                }
            }
            updateActions();
        }

        function renderFileItem(f, idx) {
            var row = document.createElement('div');
            row.className = 'file-item';
            row.dataset.idx = idx;
            row.innerHTML =
                '<div class="file-info">' +
                    '<span class="file-name"></span>' +
                    '<span class="file-size"></span>' +
                '</div>' +
                '<div class="file-progress-wrap">' +
                    '<progress class="file-progress" max="100" value="0"></progress>' +
                    '<span class="file-status">Queued</span>' +
                '</div>' +
                '<button type="button" class="file-remove" title="Remove">&times;</button>';

            row.querySelector('.file-name').textContent = f.name;
            row.querySelector('.file-size').textContent = formatSize(f.size);

            row.querySelector('.file-remove').addEventListener('click', function() {
                var i = parseInt(row.dataset.idx, 10);
                selectedFiles.splice(i, 1);
                row.remove();
                // Re-index remaining rows
                var rows = fileListEl.querySelectorAll('.file-item');
                rows.forEach(function(r, n) { r.dataset.idx = n; });
                updateActions();
            });

            fileListEl.appendChild(row);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function updateActions() {
            var n = selectedFiles.length;
            if (n === 0) {
                actionsEl.style.display = 'none';
            } else {
                actionsEl.style.display = 'block';
                uploadBtn.textContent = 'Upload ' + n + ' file(s)';
            }
        }

        // ── Clear ────────────────────────────────────────────
        clearBtn.addEventListener('click', function() {
            selectedFiles = [];
            fileListEl.innerHTML = '';
            updateActions();
        });

        // ── Upload via AJAX ──────────────────────────────────
        uploadBtn.addEventListener('click', function() {
            if (selectedFiles.length === 0) return;
            uploadBtn.disabled = true;
            clearBtn.disabled = true;
            uploadFilesSequential();
        });

        function uploadFilesSequential() {
            // Upload each file individually to /api/v1/documents/submit
            // so we get real per-file progress via XMLHttpRequest.
            var idx = 0;

            function next() {
                if (idx >= selectedFiles.length) {
                    // All done → redirect to batch results summary page.
                    window.location.href = '/upload?done=1';
                    return;
                }
                var f = selectedFiles[idx];
                var row = fileListEl.querySelector('.file-item[data-idx="' + idx + '"]');
                uploadOne(f, row, function(ok) {
                    idx++;
                    next();
                });
            }
            next();
        }

        function uploadOne(file, row, cb) {
            var statusEl = row.querySelector('.file-status');
            var progEl   = row.querySelector('.file-progress');

            var xhr = new XMLHttpRequest();
            var fd = new FormData();
            fd.append('file', file);

            xhr.open('POST', '/api/v1/documents/submit', true);

            // Progress
            if (xhr.upload) {
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        var pct = Math.round((e.loaded / e.total) * 100);
                        progEl.value = pct;
                        statusEl.textContent = pct + '%';
                    }
                });
            }

            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    progEl.value = 100;
                    statusEl.textContent = '✅ Done';
                    row.classList.add('file-done');
                } else {
                    var msg = '❌ Failed';
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data.detail) msg = '❌ ' + data.detail;
                    } catch (e) {}
                    statusEl.textContent = msg;
                    row.classList.add('file-failed');
                }
                cb(true);
            };

            xhr.onerror = function() {
                statusEl.textContent = '❌ Network error';
                row.classList.add('file-failed');
                cb(false);
            };

            xhr.send(fd);
        }
    })();
    </script>

    <style>
    .drop-zone {
        border: 2px dashed var(--border, #ccc);
        border-radius: 12px;
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
        background: var(--surface-hover, rgba(0,0,0,0.04));
        border-color: var(--accent, #4a90d9);
    }
    .drop-zone.drag-over {
        background: var(--accent-soft, rgba(74,144,217,0.12));
    }
    .drop-zone-inner .drop-icon {
        opacity: 0.5;
        margin-bottom: 8px;
    }
    .drop-hint {
        color: var(--text-muted, #888);
        font-size: 0.85em;
        margin-top: 4px;
    }
    .file-list {
        margin-bottom: 12px;
    }
    .file-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border, #eee);
        border-radius: 8px;
        margin-bottom: 8px;
    }
    .file-item.file-done {
        border-color: var(--ok, #2e7d32);
        background: var(--ok-soft, rgba(46,125,50,0.06));
    }
    .file-item.file-failed {
        border-color: var(--err, #c62828);
        background: var(--err-soft, rgba(198,40,40,0.06));
    }
    .file-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
    }
    .file-name {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .file-size {
        font-size: 0.8em;
        color: var(--text-muted, #888);
    }
    .file-progress-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 200px;
    }
    .file-progress {
        width: 140px;
        height: 8px;
    }
    .file-status {
        font-size: 0.85em;
        white-space: nowrap;
        min-width: 60px;
    }
    .file-remove {
        background: none;
        border: none;
        font-size: 1.4em;
        color: var(--text-muted, #999);
        cursor: pointer;
        padding: 0 4px;
    }
    .file-remove:hover {
        color: var(--err, #c62828);
    }
    .upload-actions {
        display: flex;
        gap: 8px;
    }
    </style>
{% endblock %}
