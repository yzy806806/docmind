{% extends "base.html" %}

{% block content %}
    <div class="card">
        <h2>{{ page_title }}</h2>
        <p class="pagination-info">
            <a href="/documents">← Back to Documents</a>
        </p>

        <form method="post" action="{{ form_action }}" class="settings-form" style="margin-top:16px;">
            <div class="settings-field">
                <label for="name">Collection Name</label>
                <input type="text" id="name" name="name" required
                       value="{{ collection.name if collection else '' }}"
                       placeholder="e.g. Research Papers"
                       style="width:100%;padding:8px 12px;border:2px solid var(--input-border);border-radius:6px;font-size:1em;background:var(--surface);color:var(--text);">
            </div>

            <div class="settings-field">
                <label for="description">Description (optional)</label>
                <textarea id="description" name="description" rows="3"
                          placeholder="A short description of this collection"
                          style="width:100%;padding:8px 12px;border:2px solid var(--input-border);border-radius:6px;font-size:1em;background:var(--surface);color:var(--text);">{{ collection.description if collection else '' }}</textarea>
            </div>

            <div class="settings-field">
                <label for="parent_id">Parent Collection (optional)</label>
                <select id="parent_id" name="parent_id"
                        style="width:100%;padding:8px 12px;border:2px solid var(--input-border);border-radius:6px;font-size:1em;background:var(--surface);color:var(--text);">
                    <option value="">— None (top-level) —</option>
                    {% for col in parent_choices %}
                        {% if not collection or col.id != collection.id %}
                        <option value="{{ col.id }}"
                            {% if collection and collection.parent_id == col.id %}selected{% endif %}>
                            {{ col.indented_name }}
                        </option>
                        {% endif %}
                    {% endfor %}
                </select>
                <p class="settings-hint">Nest this collection under a parent to build a hierarchy.</p>
            </div>

            <div class="settings-actions">
                <button type="submit" class="btn-save">
                    {{ 'Update Collection' if mode == 'edit' else 'Create Collection' }}
                </button>
                {% if mode == 'edit' %}
                <button type="submit" formaction="{{ delete_action }}" formmethod="post"
                        class="btn-delete"
                        onclick="return confirm('Delete this collection? Documents will be moved to All Documents. Child collections will also be deleted.');">
                    Delete Collection
                </button>
                {% endif %}
                <a href="/documents" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
